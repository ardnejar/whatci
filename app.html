<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>%TITLE%</title>

    <meta name="color-scheme" content="dark light" />

    <style>
      :root {
        color-scheme: dark light;
        --datetime-color: hsl(254deg 100% 81%);
        --link-color: #6ea8ff;
        --highlight-color: #ffbe64;
        --content-padding: 0 1.2rem;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        width: 100vw;
        max-width: 540px;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 0;
        margin: auto;
        background: #000;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #fff;
      }
      main {
        width: 100vw;
        max-width: 540px;
        container-type: inline-size;
        padding: 3rem 1.2rem;
      }
      footer {
        /* margin-top: 2rem; */
        margin-bottom: 4rem;
        line-height: 1.6;
      }
      h1 {
        font-weight: 1000;
        margin-bottom: 3rem;
        background: linear-gradient(100deg, var(--highlight-color), var(--datetime-color), var(--link-color));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      h2 {
        margin-bottom: 1rem;
        margin-top: 3rem;
        font-size: 1.5rem;
        font-weight: 1000;
        color: var(--highlight-color);
      }
      h3 {
        font-size: 1rem;
        font-weight: 800;
        margin: 3rem 0 0rem;
        color: var(--highlight-color);
      }
      hr {
        border: none;
        height: 1px;
        background: linear-gradient(100deg, var(--highlight-color), var(--datetime-color), var(--link-color));
      }
      code {
        background: #1e1e1e;
        padding: 0.15em 0.4em;
        border-radius: 3px;
        font-size: 0.9em;
        font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      }
      pre {
        background: #1e1e1e;
        padding: 0.75rem 1rem;
        border-radius: 4px;
        margin: 0 0 0.75rem;
        overflow-x: auto;
      }
      pre code {
        background: none;
        padding: 0;
      }
      a {
        color: var(--link-color);
      }
      ul {
        margin: 0;
        padding: 1rem 1.6rem 0 1rem;
        list-style: circle;
      }
      footer ul {
        list-style: none;
        padding: var(--content-padding);
        margin-top: 1rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      footer li {
        font-size: 2rem;
        font-weight: 1000;
      }
      @media (min-width: 500px) {
        footer ul {
          flex-direction: row;
          gap: 1.5rem;
          justify-content: space-between;
        }
        footer li {
          font-size: 1.2rem;
          font-weight: 800;
        }
      }
      @media (prefers-color-scheme: light) {
        :root {
          --datetime-color: #555;
          --link-color: #0057d8;
        }
        body {
          background: #ffffff;
          color: #1a1a1a;
        }
        hr {
          border-top-color: #ddd;
        }
        code {
          background: #f0f0f0;
        }
        pre {
          background: #f0f0f0;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <article>%CONTENT%</article>
    </main>

    <footer>%ADMIN_FOOTER%</footer>

    <script type="module" src="/src/help.ts"></script>
  </body>
</html>
