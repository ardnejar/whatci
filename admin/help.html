<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>What CI — Admin Help</title>

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        padding: 2rem 1.5rem;
        background: #ffffff;
        color: #1a1a1a;
        line-height: 1.6;
      }
      main {
        width: 100%;
        max-width: 720px;
      }
      .admin-help h1 {
        font-size: 1.75rem;
        font-weight: 700;
        margin: 0 0 0.25rem;
      }
      .admin-help h2 {
        font-size: 1.2rem;
        font-weight: 600;
        margin: 2rem 0 0.5rem;
      }
      .admin-help h3 {
        font-size: 1rem;
        font-weight: 600;
        margin: 1.25rem 0 0.25rem;
      }
      .admin-help p {
        margin: 0 0 0.75rem;
      }
      .admin-help hr {
        border: none;
        border-top: 1px solid #ddd;
        margin: 2rem 0;
      }
      .admin-help code {
        background: #f0f0f0;
        padding: 0.15em 0.4em;
        border-radius: 3px;
        font-size: 0.9em;
        font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      }
      .admin-help pre {
        background: #f0f0f0;
        padding: 0.75rem 1rem;
        border-radius: 4px;
        overflow-x: auto;
      }
      .admin-help pre code {
        background: none;
        padding: 0;
      }
      .admin-help table {
        border-collapse: collapse;
        width: 100%;
        margin: 0.75rem 0;
        font-size: 0.95em;
      }
      .admin-help th,
      .admin-help td {
        text-align: left;
        padding: 0.4rem 0.75rem;
        border: 1px solid #ddd;
      }
      .admin-help th {
        background: #f5f5f5;
        font-weight: 600;
      }
      .admin-help ul,
      .admin-help ol {
        padding-left: 1.5rem;
        margin: 0 0 0.75rem;
      }
      .admin-help strong {
        font-weight: 600;
      }
      .admin-help a {
        color: #0057d8;
      }
    </style>
  </head>
  <body>
    <main>
      %VITE_ADMIN-HELP%
    </main>
  </body>
</html>
