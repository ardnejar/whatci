<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>What CI</title>
    <meta name="description" content="Contact Improvisation in and near Whatcom County, Washington" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://whatci.org/" />
    <meta property="og:title" content="What CI" />
    <meta property="og:description" content="Contact Improvisation in and near Whatcom County, Washington" />
    <meta property="og:card" content="summary" />

    <meta name="color-scheme" content="dark light" />

    <style>
      :root {
        color-scheme: dark light;
        --datetime-color: hsl(254deg 100% 81%);
        --link-color: #6ea8ff;
        --highlight-color: #ffbe64;
        --content-padding: 0 1.2rem;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        width: 100vw;
        min-height: 100dvh;
        display: flex;
        /* align-items: center; */
        justify-content: center;
        padding: 0;
        margin: 0;
        background: #000;
        /* font-family: 'Lucida Grande', sans-serif; */
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #fff;
      }
      main {
        width: 100vw;
        max-width: 540px;
        container-type: inline-size;
      }
      section {
        margin-top: 2rem;
        margin-bottom: 2rem;
        padding: var(--content-padding);
        line-height: 1.6;
      }
      h1 {
        font-size: 20cqi;
        font-weight: 1000;
        margin-bottom: 1rem;
        /* background:
        linear-gradient(217deg, rgb(255 0 0 / 0.8), transparent 70.71%),
        linear-gradient(127deg, rgb(0 255 0 / 0.8), transparent 70.71%),
        linear-gradient(336deg, rgb(0 0 255 / 0.8), transparent 70.71%); */
        background: linear-gradient(100deg, var(--highlight-color), var(--datetime-color), var(--link-color));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        white-space: nowrap;
      }
      p {
        margin: 0 0 0.75rem;
      }
      p:last-child {
        margin-bottom: 0;
      }
      a {
        color: var(--link-color);
      }
      event-list {
        min-height: 30vh;
      }
      .links {
        display: flex;
        flex-direction: column;
        margin-top: 4rem;
      }
      link-list {
        min-height: 30vh;
        padding: var(--content-padding);
      }
      @media (prefers-color-scheme: light) {
        :root {
          --datetime-color: #555;
          --link-color: #0057d8;
        }
        body {
          background: #ffffff;
          color: #1a1a1a;
        }
        a {
          color: var(--link-color);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <article>
        %VITE_MESSAGE%
        <section class="events">
          <event-list></event-list>
        </section>
        <!-- Calendar Help -->
        %VITE_CALENDAR_HELP%

        <!-- Newsletter -->
        %VITE_NEWSLETTER%
        <section class="links">
          <!-- <link-list></link-list> -->
        </section>
      </article>
    </main>

    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
