<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>What CI — Admin Help</title>

    <meta name="color-scheme" content="dark light" />

    <style>
      :root {
        color-scheme: dark light;
        --datetime-color: hsl(254deg 100% 81%);
        --link-color: #6ea8ff;
        --highlight-color: #ffbe64;
        --content-padding: 0 1.2rem;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        width: 100vw;
        min-height: 100dvh;
        display: flex;
        justify-content: center;
        padding: 0;
        margin: 0;
        background: #000;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #fff;
      }
      main {
        width: 100vw;
        max-width: 540px;
        container-type: inline-size;
      }
      h1 {
        /* font-size: 10cqi; */
        font-weight: 1000;
        margin-bottom: 1rem;
        background: linear-gradient(100deg, var(--highlight-color), var(--datetime-color), var(--link-color));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        white-space: nowrap;
      }
      .admin-help {
        margin-bottom: 2rem;
        padding: var(--content-padding);
        line-height: 1.6;
      }
      p {
        margin: 0 0 0.75rem;
      }
      p:last-child {
        margin-bottom: 0;
      }
      a {
        color: var(--link-color);
      }
      @media (prefers-color-scheme: light) {
        :root {
          --datetime-color: #555;
          --link-color: #0057d8;
        }
        body {
          background: #ffffff;
          color: #1a1a1a;
        }
        a {
          color: var(--link-color);
        }
      }
      /* Extra styles for elements not present on the home page */
      h2 {
        margin-bottom: 1rem;
        font-size: 1.5rem;
        font-weight: 1000;
        color: var(--highlight-color);
      }
      h3 {
        font-size: 1rem;
        font-weight: 600;
        margin: 1.25rem 0 0.25rem;
      }
      hr {
        border: none;
        border-top: 1px solid #333;
        margin: 2rem 0;
      }
      code {
        background: #1e1e1e;
        padding: 0.15em 0.4em;
        border-radius: 3px;
        font-size: 0.9em;
        font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      }
      pre {
        background: #1e1e1e;
        padding: 0.75rem 1rem;
        border-radius: 4px;
        margin: 0 0 0.75rem;
        overflow-x: auto;
      }
      pre code {
        background: none;
        padding: 0;
      }
      @media (prefers-color-scheme: light) {
        hr {
          border-top-color: #ddd;
        }
        code {
          background: #f0f0f0;
        }
        pre {
          background: #f0f0f0;
        }
      }
    </style>
  </head>
  <body>
    <main>%VITE_ADMIN_HELP%</main>
  </body>
  <script type="module" src="/src/help.ts"></script>
</html>
