<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>What CI</title>
    <meta name="description" content="Contact Improvisation in and near Whatcom County, Washington" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://whatci.org/" />
    <meta property="og:title" content="What CI" />
    <meta property="og:description" content="Contact Improvisation in and near Whatcom County, Washington" />
    <meta property="og:card" content="summary" />

    <meta name="color-scheme" content="dark light" />

    <style>
      :root {
        color-scheme: dark light;
        --datetime-color: hsl(56 100% 90% / 1);
        --link-color: #6ea8ff;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
        background: #000;
        color: #fff;
      }
      main {
        width: 100%;
        max-width: 720px;
      }
      section {
        margin-top: 2rem;
        margin-bottom: 2rem;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 1rem;
      }
      .message {
        margin-bottom: 2rem;
        line-height: 1.6;
      }
      .message p {
        margin: 0 0 0.75rem;
      }
      .message p:last-child {
        margin-bottom: 0;
      }
      .message a {
        color: #6ea8ff;
      }
      .links {
        display: flex;
        flex-direction: column;
        margin-top: 4rem;
      }
      link-item + link-item {
        border-top: 1px solid #333;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --datetime-color: #555;
          --link-color: #0057d8;
        }
        body {
          background: #ffffff;
          color: #1a1a1a;
        }
        .message a {
          color: #0057d8;
        }
        link-item + link-item {
          border-top-color: #e0e0e0;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <article>
        %VITE_MESSAGE%
        <section class="events">
          <event-list></event-list>
        </section>

        <section class="links">
          <h2>Resources and Subscription Links</h2>
          <div id="links"></div>
        </section>
      </article>
    </main>

    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
